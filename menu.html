<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore the menu and order your favourite dishes on DRJ FOODS.">
  <title>Menu — DRJ FOODS</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🍽️</text></svg>">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🍽️</div>
        <div class="logo-text">DRJ <span>FOODS</span></div>
      </a>
      <nav class="nav">
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Home</a></li>
          <li><a href="restaurants.html" class="active">Restaurants</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
        <a href="cart.html" class="cart-btn" id="headerCartBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Cart
          <span class="cart-badge" id="cartBadge"></span>
        </a>
        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </div>
  </header>

  <!-- ==================== RESTAURANT HERO ==================== -->
  <section class="menu-hero" id="menuHero">
    <img id="heroImg" src="" alt="Restaurant">
    <div class="overlay-gradient"></div>
    <div class="menu-hero-content">
      <div class="container">
        <h1 id="restaurantName">Loading…</h1>
        <div class="menu-info-row">
          <div class="menu-info-item rating-item" id="menuRating">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span></span>
          </div>
          <div class="menu-info-item" id="menuCuisine">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
            <span></span>
          </div>
          <div class="menu-info-item" id="menuDelivery">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span></span>
          </div>
          <div class="menu-info-item" id="menuPrice">
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ==================== CATEGORY TABS ==================== -->
  <div class="container">
    <div class="category-tabs" id="categoryTabs">
      <button class="category-tab active" data-category="All">All</button>
      <button class="category-tab" data-category="Starter">🥗 Starters</button>
      <button class="category-tab" data-category="Main">🍽️ Mains</button>
      <button class="category-tab" data-category="Dessert">🍰 Desserts</button>
      <button class="category-tab" data-category="Drink">🥤 Drinks</button>
    </div>

    <!-- ==================== MENU GRID ==================== -->
    <div class="menu-grid" id="menuGrid">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Floating Cart Button -->
  <a href="cart.html" class="floating-cart hidden" id="floatingCart">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span id="floatingCartCount">0 items</span>
    <span class="divider"></span>
    <span id="floatingCartTotal">₹0</span>
  </a>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none; padding-top:0;">
        <span>© 2026 DRJ FOODS. All rights reserved.</span>
        <span>Made with 🧡 in India</span>
      </div>
    </div>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toastMessage">Item added to cart!</span>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
