<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your cart and place your order on DRJ FOODS.">
  <title>Cart — DRJ FOODS</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🍽️</text></svg>">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🍽️</div>
        <div class="logo-text">DRJ <span>FOODS</span></div>
      </a>
      <nav class="nav">
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Home</a></li>
          <li><a href="restaurants.html">Restaurants</a></li>
          <li><a href="cart.html" class="active">Cart</a></li>
        </ul>
        <a href="cart.html" class="cart-btn" id="headerCartBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Cart
          <span class="cart-badge" id="cartBadge"></span>
        </a>
        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </div>
  </header>

  <!-- ==================== CART PAGE ==================== -->
  <div class="cart-page">
    <div class="container">
      <div class="cart-layout" id="cartLayout">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ==================== SUCCESS MODAL ==================== -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <div class="modal-icon">🎉</div>
      <h2>Order Placed!</h2>
      <p>Your food is being prepared and will be delivered soon. Thank you for choosing DRJ FOODS!</p>
      <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>
  </div>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top:none; padding-top:0;">
        <span>© 2026 DRJ FOODS. All rights reserved.</span>
        <span>Made with 🧡 in India</span>
      </div>
    </div>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toastMessage">Item added to cart!</span>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
